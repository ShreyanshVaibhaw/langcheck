# cargo-deny configuration — dependency license & supply-chain policy.
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# Run locally with: cargo deny check

[advisories]
# Fail on any crate pulled from a yanked release. Security advisories are denied
# by default in the current cargo-deny schema.
yanked = "deny"
ignore = []

[licenses]
# Only permissive, redistribution-friendly licenses are allowed. A dependency
# whose license is not on this list must be justified in a dependency review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path dependencies are intentionally versionless; only an
# external crate pinned to "*" is a supply-chain/reproducibility concern.
allow-wildcard-paths = true
# Offline guarantee (blueprint.md Sections 1.1, 16): the dependency tree must
# contain no networking, telemetry, crash-upload, remote-logging, cloud-sync, or
# update client, and no general-purpose async runtime in the resident process.
# Defence-in-depth on top of dependency review.
deny = [
    { crate = "reqwest", reason = "HTTP client — no networking (blueprint 1.1)" },
    { crate = "hyper", reason = "HTTP — no networking" },
    { crate = "ureq", reason = "HTTP client — no networking" },
    { crate = "isahc", reason = "HTTP client — no networking" },
    { crate = "curl", reason = "HTTP client — no networking" },
    { crate = "attohttpc", reason = "HTTP client — no networking" },
    { crate = "surf", reason = "HTTP client — no networking" },
    { crate = "tonic", reason = "gRPC client — no networking" },
    { crate = "tokio", reason = "async runtime — not permitted in the resident process (blueprint 16)" },
    { crate = "async-std", reason = "async runtime — not permitted (blueprint 16)" },
    { crate = "sentry", reason = "crash/telemetry upload — prohibited (blueprint 1.1)" },
    { crate = "opentelemetry", reason = "telemetry — prohibited" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
